<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Requirement Knowledge Tracker - MVP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="p-4">
    <div class="container">
      <h1>Requirement Knowledge Tracker</h1>
      <form action="/submit" method="post" enctype="multipart/form-data">
        <div class="mb-3">
          <label class="form-label">Email Subject</label>
          <input name="subject" id="subject" class="form-control" required onchange="updateProjectName()" oninput="updateProjectName()" />
        </div>
        <div class="mb-3">
          <label class="form-label">Project Name</label>
          <input name="project_name" id="project_name" class="form-control" />
        </div>
        <div class="mb-3">
          <label class="form-label">Email Body</label>
          <textarea name="body" class="form-control" rows="8" required></textarea>
        </div>
        <script>
          function updateProjectName() {
            const subject = document.getElementById('subject').value;
            const projectName = document.getElementById('project_name');
            if (subject && !projectName.value) {
              projectName.value = subject;
            }
          }
        </script>
        <div class="mb-3">
          <label class="form-label">Attachments</label>
          <input type="file" name="files" multiple class="form-control" />
        </div>
        <button class="btn btn-primary" type="submit">Process Email</button>
      </form>
    </div>
  </body>
</html>
